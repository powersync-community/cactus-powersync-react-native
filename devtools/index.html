<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cactus + PowerSync — DevTools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #5b8dee;
      --accent-dim: #3a5bbf22;
      --text: #e2e4ed;
      --text-dim: #7b7f96;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --danger: #e05c5c;
      --success: #4caf7d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: .3px; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      font-family: var(--mono);
    }
    .badge.error { background: #e05c5c22; color: var(--danger); }
    .spacer { flex: 1; }
    .db-path {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid #5b8dee44;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: background .15s;
    }
    button:hover { background: #5b8dee33; }
    button:active { background: #5b8dee44; }

    /* ── Layout ─────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    aside {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 14px 4px;
    }
    .table-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: background .1s;
    }
    .table-item:hover { background: var(--surface); }
    .table-item.active { background: var(--accent-dim); color: var(--accent); }
    .table-item.active .tname { color: var(--accent); }
    .tname { font-family: var(--mono); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tcount { font-family: var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .table-item.active .tcount { color: var(--accent); opacity: .7; }

    /* ── Main panel ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .toolbar h2 { font-size: 13px; font-weight: 600; font-family: var(--mono); }
    .toolbar .row-count { font-size: 12px; color: var(--text-dim); }

    /* ── SQL editor ─────────────────────────────────────── */
    .sql-bar {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sql-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      resize: none;
      height: 56px;
      line-height: 1.5;
    }
    .sql-bar textarea:focus { outline: none; border-color: var(--accent); }
    .sql-bar .run-btn {
      align-self: flex-end;
      padding: 6px 16px;
    }

    /* ── Table ───────────────────────────────────────────── */
    .table-wrap {
      flex: 1;
      overflow: auto;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 7px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text-dim);
      white-space: nowrap;
      z-index: 1;
    }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; }
    tbody tr:hover { background: var(--surface); }
    tbody td {
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 11px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td.null { color: var(--text-dim); font-style: italic; }
    td.long { color: var(--text-dim); }

    /* ── Pagination ─────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Row detail overlay ─────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .detail-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(700px, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .detail-header h3 { font-size: 13px; font-weight: 600; }
    .close-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .close-btn:hover { color: var(--text); background: none; }
    .detail-body { overflow-y: auto; padding: 12px 0; }
    .detail-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .detail-col { color: var(--text-dim); font-family: var(--mono); font-weight: 700; word-break: break-all; }
    .detail-val { color: var(--text); font-family: var(--mono); word-break: break-all; white-space: pre-wrap; }
    .detail-val.null-val { color: var(--text-dim); font-style: italic; }

    /* ── Empty / loading states ─────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .placeholder .icon { font-size: 32px; }
    .error-bar {
      padding: 8px 14px;
      background: #e05c5c18;
      border-bottom: 1px solid #e05c5c44;
      color: var(--danger);
      font-size: 12px;
      font-family: var(--mono);
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Cactus + PowerSync</h1>
  <span class="badge" id="status-badge">connecting…</span>
  <span class="db-path" id="db-path"></span>
  <span class="spacer"></span>
  <button onclick="refresh()">↺ Refresh</button>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-label">Tables</div>
    <div id="table-list"></div>
  </aside>

  <main>
    <div id="toolbar" class="toolbar" style="display:none">
      <h2 id="table-title"></h2>
      <span class="row-count" id="row-count"></span>
      <span class="spacer"></span>
    </div>

    <div class="sql-bar">
      <textarea id="sql-input" placeholder="SELECT * FROM demo_documents LIMIT 10"></textarea>
      <button class="run-btn" onclick="runSql()">▶ Run</button>
    </div>

    <div id="error-bar" class="error-bar" style="display:none"></div>

    <div class="table-wrap">
      <div class="placeholder" id="placeholder">
        <span class="icon">🗄️</span>
        <span>Select a table or run a SQL query</span>
      </div>
      <table id="data-table" style="display:none">
        <thead id="data-head"></thead>
        <tbody id="data-body"></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination" style="display:none">
      <button onclick="prevPage()" id="prev-btn">← Prev</button>
      <span id="page-info"></span>
      <button onclick="nextPage()" id="next-btn">Next →</button>
    </div>
  </main>
</div>

<!-- Row detail overlay -->
<div class="overlay hidden" id="overlay" onclick="closeDetail(event)">
  <div class="detail-modal">
    <div class="detail-header">
      <h3>Row detail</h3>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  const PAGE_SIZE = 100;
  let currentTable = null;
  let currentOffset = 0;
  let currentTotal = 0;

  // ── Status ──────────────────────────────────────────────────────────────

  async function checkStatus() {
    try {
      const r = await fetch('/api/status').then(r => r.json());
      const badge = document.getElementById('status-badge');
      const pathEl = document.getElementById('db-path');
      if (r.found) {
        badge.textContent = 'connected';
        badge.className = 'badge';
        const parts = r.path.split('/');
        pathEl.textContent = '…/' + parts.slice(-4).join('/');
        pathEl.title = r.path;
      } else {
        badge.textContent = 'db not found';
        badge.className = 'badge error';
        pathEl.textContent = 'Run "pnpm ios" to install the app, then refresh';
      }
    } catch {
      document.getElementById('status-badge').textContent = 'server error';
      document.getElementById('status-badge').className = 'badge error';
    }
  }

  // ── Sidebar ─────────────────────────────────────────────────────────────

  async function loadTables() {
    try {
      const tables = await fetch('/api/tables').then(r => r.json());
      if (tables.error) { showError(tables.error); return; }

      const list = document.getElementById('table-list');
      list.innerHTML = tables.map(t => `
        <div class="table-item ${currentTable === t.name ? 'active' : ''}"
             onclick="selectTable('${t.name}')">
          <span class="tname">${t.name}</span>
          <span class="tcount">${t.count < 0 ? '?' : t.count}</span>
        </div>
      `).join('');
    } catch (e) {
      showError(e.message);
    }
  }

  async function refresh() {
    await checkStatus();
    await loadTables();
    if (currentTable) await loadTable(currentTable, currentOffset);
  }

  // ── Table view ───────────────────────────────────────────────────────────

  async function selectTable(name) {
    currentTable = name;
    currentOffset = 0;
    document.getElementById('sql-input').value = `SELECT * FROM ${name} LIMIT ${PAGE_SIZE}`;
    await loadTable(name, 0);
    await loadTables(); // update active highlight
  }

  async function loadTable(name, offset) {
    try {
      const data = await fetch(
        `/api/table/${encodeURIComponent(name)}?limit=${PAGE_SIZE}&offset=${offset}`
      ).then(r => r.json());

      if (data.error) { showError(data.error); return; }
      hideError();

      currentTotal = data.total;
      currentOffset = offset;
      renderTable(data.rows);
      renderPagination(name, offset, data.total);

      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('table-title').textContent = name;
      document.getElementById('row-count').textContent =
        `${data.total} row${data.total !== 1 ? 's' : ''}`;
    } catch (e) {
      showError(e.message);
    }
  }

  // ── SQL runner ───────────────────────────────────────────────────────────

  async function runSql() {
    const sql = document.getElementById('sql-input').value.trim();
    if (!sql) return;
    try {
      const data = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql })
      }).then(r => r.json());

      if (data.error) { showError(data.error); return; }
      hideError();

      currentTable = null;
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('pagination').style.display = 'none';
      renderTable(data.rows);
    } catch (e) {
      showError(e.message);
    }
  }

  document.getElementById('sql-input').addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runSql();
  });

  // ── Rendering ────────────────────────────────────────────────────────────

  const TRUNCATE = 120;

  function renderTable(rows) {
    const placeholder = document.getElementById('placeholder');
    const table = document.getElementById('data-table');
    const head = document.getElementById('data-head');
    const body = document.getElementById('data-body');

    if (!rows || rows.length === 0) {
      placeholder.innerHTML = '<span class="icon">∅</span><span>No rows</span>';
      placeholder.style.display = 'flex';
      table.style.display = 'none';
      return;
    }

    placeholder.style.display = 'none';
    table.style.display = 'table';

    const cols = Object.keys(rows[0]);
    head.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
    body.innerHTML = rows.map((row, i) =>
      `<tr onclick="showDetail(${i})">
        ${cols.map(c => {
          const raw = row[c];
          if (raw === null || raw === undefined) return `<td class="null">null</td>`;
          const s = String(raw);
          if (s.length > TRUNCATE) return `<td class="long" title="${escHtml(s)}">${escHtml(s.slice(0, TRUNCATE))}…</td>`;
          return `<td>${escHtml(s)}</td>`;
        }).join('')}
      </tr>`
    ).join('');

    // stash rows for detail view
    window._rows = rows;
  }

  function renderPagination(name, offset, total) {
    const pg = document.getElementById('pagination');
    const info = document.getElementById('page-info');
    const prev = document.getElementById('prev-btn');
    const next = document.getElementById('next-btn');

    if (total <= PAGE_SIZE) { pg.style.display = 'none'; return; }

    pg.style.display = 'flex';
    const page = Math.floor(offset / PAGE_SIZE) + 1;
    const pages = Math.ceil(total / PAGE_SIZE);
    info.textContent = `Page ${page} / ${pages}  (${total} rows)`;
    prev.disabled = offset === 0;
    next.disabled = offset + PAGE_SIZE >= total;
  }

  function prevPage() {
    if (!currentTable) return;
    loadTable(currentTable, Math.max(0, currentOffset - PAGE_SIZE));
  }

  function nextPage() {
    if (!currentTable) return;
    loadTable(currentTable, currentOffset + PAGE_SIZE);
  }

  // ── Row detail ───────────────────────────────────────────────────────────

  function showDetail(i) {
    const row = window._rows?.[i];
    if (!row) return;

    const body = document.getElementById('detail-body');
    body.innerHTML = Object.entries(row).map(([col, val]) => {
      const isNull = val === null || val === undefined;
      const display = isNull ? 'null' : String(val);
      return `
        <div class="detail-row">
          <span class="detail-col">${escHtml(col)}</span>
          <span class="detail-val ${isNull ? 'null-val' : ''}">${escHtml(display)}</span>
        </div>`;
    }).join('');

    document.getElementById('overlay').classList.remove('hidden');
  }

  function closeDetail(e) {
    if (!e || e.target === document.getElementById('overlay') || e.currentTarget.classList.contains('close-btn')) {
      document.getElementById('overlay').classList.add('hidden');
    }
  }

  // ── Error bar ─────────────────────────────────────────────────────────────

  function showError(msg) {
    const bar = document.getElementById('error-bar');
    bar.textContent = msg;
    bar.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-bar').style.display = 'none';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  checkStatus();
  loadTables();
  setInterval(() => {
    checkStatus();
    loadTables();
    if (currentTable) loadTable(currentTable, currentOffset);
  }, 5000);
</script>
</body>
</html>
